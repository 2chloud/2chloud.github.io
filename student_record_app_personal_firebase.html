<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#EEF2F7;color:#111827;font-size:14px}
:root{
  --navy:#1A2535;--navy2:#243040;--blue:#1E40AF;--blue-l:#DBEAFE;--blue-m:#1D4ED8;--blue-d:#1E3A8A;
  --purple:#6D28D9;--purple-l:#EDE9FE;
  --green:#065F46;--green-l:#D1FAE5;
  --amber:#92400E;--amber-l:#FEF3C7;
  --slate:#1E293B;--slate-l:#E0EEFF;
  --red:#DC2626;--red-l:#FEE2E2;
  --border:#D1D5DB;--bg:#EEF2F7;--card:#FFFFFF;
  --text:#111827;--muted:#6B7280;--soft:#9CA3AF;
  --success:#059669
}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:200px;min-width:200px;background:#0F1C2E;display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sb-eyebrow{font-size:10px;color:#5B8DB8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.sb-title{font-size:18px;font-weight:800;color:#FFFFFF;line-height:1.2}
.sb-sub{font-size:12px;color:#5B8DB8;margin-top:3px;font-weight:500}
.sb-scroll-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
.sb-scroll{height:100%;overflow-y:auto;background:#060E18}
.sb-scroll-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:32px;background:linear-gradient(transparent,#060E18);pointer-events:none;z-index:1}
.sb-sec{padding:10px 15px 4px;font-size:10px;color:#3D6080;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.sb-btn{width:100%;display:flex;align-items:center;padding:0;background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;font-family:inherit;transition:all .12s}
.sb-btn:hover{background:rgba(255,255,255,0.05)}
.sb-btn.active{background:rgba(59,130,246,0.18);border-left-color:#60A5FA}
.sb-btn-inner{padding:7px 15px;flex:1}
.sb-cls-name{font-size:13px;color:#E8F2FA;font-weight:700;display:flex;align-items:center;gap:6px}
.sb-btn.active .sb-cls-name{color:#FFFFFF;font-weight:800}
.sb-cls-meta{font-size:11px;color:#8AAFD0;font-weight:500}
.sb-btn.active .sb-cls-meta{color:#7AAAD0;font-weight:600}
.sb-badge{font-size:10px;padding:2px 8px;background:#1D4ED8;color:#BFDBFE;border-radius:5px;font-weight:800;letter-spacing:.3px}
.sb-stat-item{width:100%;padding:8px 18px;display:flex;align-items:center;gap:9px;background:transparent;border:none;border-left:3px solid transparent;cursor:pointer;font-family:inherit;transition:all .12s}
.sb-stat-item:hover{background:rgba(255,255,255,0.05)}
.sb-stat-item.active{background:rgba(59,130,246,0.18);border-left-color:#60A5FA}
.sb-stat-name{font-size:16px;color:#C8DCF0;font-weight:600}
.sb-stat-item.active .sb-stat-name{color:#FFFFFF;font-weight:800}
.sb-settings{padding:9px 15px;border-top:1px solid rgba(255,255,255,0.07);background:none;border-bottom:none;border-right:none;border-left:none;cursor:pointer;font-family:inherit;color:#8AAFD0;font-size:12px;font-weight:700;text-align:left;display:flex;align-items:center;gap:7px;width:100%;transition:color .12s}
.sb-settings:hover{color:#C8DCF0}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
.hd{padding:14px 22px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0}
.hd-left h1{font-size:19px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.hd-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--blue-l);color:var(--blue-m)}
.hd-meta{font-size:12px;color:var(--soft);margin-top:2px}
.hd-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ── FILTER BAR ── */
.fb{padding:8px 22px;background:#F8FAFC;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0;min-height:44px}
.chip{padding:3px 12px;border-radius:999px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);font-weight:500;transition:all .1s;white-space:nowrap;line-height:1.6}
.chip:hover{border-color:#93C5FD}
.chip.a-전체{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip.a-자율{background:var(--blue-l);color:var(--blue-m);border-color:var(--blue-m);font-weight:700}
.chip.a-진로{background:var(--purple-l);color:var(--purple);border-color:var(--purple);font-weight:700}
.chip.a-행동특성{background:var(--green-l);color:var(--green);border-color:var(--green);font-weight:700}
.chip.a-상담메모{background:var(--amber-l);color:var(--amber);border-color:var(--amber);font-weight:700}
.chip.a-동아리{background:#CCFBF1;color:#0F766E;border-color:#0D9488;font-weight:700}
.chip.a-교과{background:var(--slate-l);color:var(--slate);border-color:var(--slate);font-weight:700}
.chip.a-학종분석{background:#F5F3FF;color:#6D28D9;border-color:#7C3AED;font-weight:700}
input[type=date]{padding:3px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:var(--text);outline:none;cursor:pointer;height:28px}
input[type=date].has-val{background:var(--blue-l);border-color:#93C5FD}
.fb-search{margin-left:auto;padding:3px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;width:130px;outline:none;background:#fff;color:var(--text);height:28px}
/* ── CALENDAR ── */
.cal-wrap{position:relative;display:inline-block}
.cal-trigger{padding:3px 11px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:var(--muted);height:28px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:border-color .1s}
.cal-trigger:hover{border-color:#93C5FD}
.cal-trigger.has-val{background:var(--blue-l);border-color:#93C5FD;color:var(--blue-m);font-weight:600}
.cal-pop{position:absolute;top:34px;left:0;background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 28px rgba(0,0,0,.13);z-index:200;padding:14px;width:240px}
.cal-pop.right{left:auto;right:0}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);padding:2px 6px;border-radius:5px;line-height:1}
.cal-nav:hover{background:#F1F5F9;color:var(--text)}
.cal-month{font-size:13px;font-weight:700;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;font-weight:600;color:var(--soft);text-align:center;padding:2px 0}
.cal-day{position:relative;font-size:12px;text-align:center;padding:4px 2px;border-radius:6px;cursor:pointer;color:var(--text);transition:background .1s;line-height:1.4}
.cal-day:hover{background:#EFF6FF}
.cal-day.empty{cursor:default}
.cal-day.has-rec::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--blue-m)}
.cal-day.sel{background:var(--blue-m);color:#fff;font-weight:700}
.cal-day.sel::after{background:#fff}
.cal-day.today{font-weight:700;color:var(--blue-m)}
.cal-day.today.sel{color:#fff}
.cal-day.no-rec{color:#C4C9D4}
.cal-day.no-rec:hover{background:#F9FAFB}
.cal-foot{margin-top:10px;display:flex;justify-content:flex-end}
.fb-search:focus{border-color:#93C5FD}

/* ── BUTTONS ── */
.btn{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;border:none;transition:opacity .1s;line-height:1.5}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-pri{background:var(--blue);color:#fff}
.btn-sec{background:#F1F5F9;color:#374151;border:1px solid #D1D5DB}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:2px 8px;font-size:11px}

/* ── STUDENT LIST ── */
.slist{flex:1;overflow-y:auto;padding:14px 22px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;align-content:start}
.scard{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;cursor:pointer;display:flex;flex-direction:column;gap:7px;transition:border-color .12s,box-shadow .12s;min-width:0}
.scard:hover{border-color:#93C5FD;box-shadow:0 2px 10px rgba(59,130,246,.1)}
.scard-head{display:flex;align-items:center;gap:8px}
.snum{width:30px;height:30px;border-radius:7px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#4B5563;flex-shrink:0}
.scard-num{font-size:11px;color:var(--soft);margin-right:4px}
.scard-name{font-weight:700;font-size:15px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scard-cnt{font-size:11px;color:var(--soft);white-space:nowrap;flex-shrink:0}
.dept-pill{font-size:10px;color:var(--purple);background:var(--purple-l);padding:1px 6px;border-radius:6px;font-weight:600;white-space:nowrap}
.scard-foot{display:flex;align-items:center;justify-content:space-between;gap:4px;min-height:18px}
.scard-types{display:flex;gap:4px;flex-wrap:wrap;align-items:center;flex:1;min-width:0}
.scard-last{font-size:10px;color:#D1D5DB;white-space:nowrap;flex-shrink:0}
.scard-arr{display:none}
.flag-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px;line-height:1;opacity:0.25;transition:opacity .15s,transform .1s;flex-shrink:0}
.flag-btn:hover{opacity:0.7;transform:scale(1.15)}
.flag-btn.on{opacity:1}
.scard.flagged{border-color:#F87171;background:#FFF8F8}
.scard.flagged:hover{border-color:#EF4444}
.flag-hd-btn{background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:14px;padding:5px 10px;line-height:1;opacity:0.45;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:5px;color:var(--muted)}
.flag-hd-btn:hover{opacity:0.8;border-color:#F87171}
.flag-hd-btn.on{opacity:1;background:#FFF0F0;border-color:#F87171;color:#DC2626;font-weight:600}
.chip.a-팔로우업{background:#FEE2E2;color:#DC2626;border-color:#F87171;font-weight:700}
.empty{text-align:center;padding:50px 0;color:var(--soft);grid-column:1/-1}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-title{font-size:14px;font-weight:600;margin-bottom:5px;color:var(--muted)}

/* ── BADGES ── */
.bdg{display:inline-block;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:700}
.bdg-자율{color:var(--blue-m);background:var(--blue-l)}
.bdg-진로{color:var(--purple);background:var(--purple-l)}
.bdg-행동특성{color:var(--green);background:var(--green-l)}
.bdg-상담메모{color:var(--amber);background:var(--amber-l)}
.bdg-동아리{color:#0F766E;background:#CCFBF1}
.bdg-교과{color:var(--slate);background:var(--slate-l)}
.bdg-학종분석{color:#6D28D9;background:#F5F3FF;border:1px solid #DDD6FE}

/* ── STUDENT DETAIL ── */
.stu-hd{padding:13px 22px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.back-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0;margin-bottom:9px;display:flex;align-items:center;gap:3px;font-family:inherit}
.back-btn:hover{color:var(--blue-m)}
.stu-info{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.stu-av{width:38px;height:38px;border-radius:9px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.stu-name{font-size:18px;font-weight:800;color:var(--text)}
.stu-meta{display:flex;align-items:center;gap:7px;margin-top:3px}
.dept-tag{font-size:12px;padding:2px 8px;border-radius:8px;cursor:pointer;border:1px dashed var(--border);color:var(--muted);background:#FAFAFA}
.dept-tag.filled{background:var(--purple-l);color:var(--purple);border:1px solid transparent}
.dept-tag:hover{border-color:#93C5FD}
.dept-edit-wrap{display:flex;align-items:center;gap:5px}
.dept-inp{padding:3px 9px;border:1px solid #93C5FD;border-radius:7px;font-size:12px;font-family:inherit;outline:none;width:130px}

/* ── RECORDS ── */
.rec-scroll{flex:1;overflow-y:auto;padding:14px 22px}
.date-grp{margin-bottom:14px}
.date-lbl{font-size:11px;font-weight:700;color:var(--soft);margin-bottom:6px;letter-spacing:.3px;padding-left:2px}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;gap:10px;margin-bottom:6px}
.rec-content{flex:1;font-size:13px;color:#1F2937;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.rec-src{font-size:11px;color:var(--soft);margin-top:4px}
.rec-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:16px;flex-shrink:0;align-self:flex-start;line-height:1;padding:1px 3px;transition:color .1s}
.rec-del:hover{color:var(--red)}

/* ── OVERLAY / MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.44);display:flex;align-items:center;justify-content:center;z-index:999;padding:14px}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.modal-lg{max-width:640px}
.modal-sm{max-width:380px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-title{font-size:15px;font-weight:800;color:var(--text)}
.modal-x{background:none;border:none;cursor:pointer;font-size:21px;color:var(--soft);line-height:1;padding:0 2px}
.modal-body{padding:20px}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;margin-top:16px}

/* ── FORM ── */
.field{margin-bottom:13px}
.lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;display:block}
.inp{width:100%;padding:8px 11px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:var(--text)}
.inp:focus{border-color:#93C5FD}
.textarea{width:100%;padding:8px 11px;border:1px solid #D1D5DB;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:var(--text);resize:vertical;line-height:1.65}
.textarea:focus{border-color:#93C5FD}

/* ── TYPE OPTS ── */
.type-opts{display:flex;gap:6px;flex-wrap:wrap}
.type-opt{padding:5px 13px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:#F9FAFB;color:var(--muted);font-weight:500;transition:all .1s}
.to-자율.on{background:var(--blue-l);color:var(--blue-m);border-color:var(--blue-m);font-weight:700}
.to-진로.on{background:var(--purple-l);color:var(--purple);border-color:var(--purple);font-weight:700}
.to-행동특성.on{background:var(--green-l);color:var(--green);border-color:var(--green);font-weight:700}
.to-상담메모.on{background:var(--amber-l);color:var(--amber);border-color:var(--amber);font-weight:700}
.to-동아리.on{background:#CCFBF1;color:#0F766E;border-color:#0D9488;font-weight:700}
.to-교과.on{background:var(--slate-l);color:var(--slate);border-color:var(--slate);font-weight:700}
.to-학종분석.on{background:#F5F3FF;color:#6D28D9;border-color:#7C3AED;font-weight:700}

/* ── STUDENT PICKER ── */
.picker-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.picker-acts{display:flex;gap:10px}
.picker-act{background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px}
.picker-box{border:1px solid var(--border);border-radius:10px;max-height:210px;overflow-y:auto;padding:6px}
.picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.prow{display:flex;align-items:center;gap:7px;padding:6px 9px;cursor:pointer;border-radius:7px;background:#FAFAFA;transition:background .08s;border:1px solid transparent}
.prow:hover{background:#EFF6FF}
.prow.sel{background:#EFF6FF;border-color:#93C5FD}
.chk{width:15px;height:15px;border-radius:4px;border:2px solid #D1D5DB;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.chk.on{background:var(--blue);border-color:var(--blue)}
.chk-tick{color:#fff;font-size:10px;line-height:1}
.pnum{font-size:11px;color:var(--soft);width:22px;flex-shrink:0}
.pname{font-size:13px;color:var(--text)}
.pname.bold{font-weight:700}

/* ── DROPZONE ── */
.dropzone{border:2px dashed #D1D5DB;border-radius:12px;padding:32px 20px;text-align:center;background:#F9FAFB;cursor:pointer;transition:all .12s}
.dropzone:hover{border-color:#93C5FD;background:#EFF6FF}
.dz-icon{font-size:30px;margin-bottom:10px}

/* ── AI BOX ── */
.ai-box{background:#F9FAFB;border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.8;color:var(--text);min-height:120px;white-space:pre-wrap;max-height:380px;overflow-y:auto}
.ai-loading{text-align:center;padding:36px 0;color:var(--muted)}

/* ── EXTRACT CARDS ── */
.ex-card{border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start;margin-bottom:7px}
.ex-info{flex:1}
.ex-top{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.ex-name{font-weight:700;font-size:14px}
.ex-content{font-size:13px;color:#374151;line-height:1.55}
.ex-del{background:none;border:none;cursor:pointer;color:#D1D5DB;font-size:16px;line-height:1;padding:0;flex-shrink:0}
.ex-del:hover{color:var(--red)}

/* ── ANALYSIS ── */
.ana-opt{border:1px solid var(--border);border-radius:11px;padding:13px;cursor:pointer;background:#F9FAFB;transition:all .12s;margin-bottom:9px}
.ana-opt:hover{border-color:#93C5FD;background:#EFF6FF}
.ana-opt-title{font-weight:700;font-size:14px;margin-bottom:3px}
.ana-opt-desc{font-size:12px;color:var(--muted)}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{padding:4px 12px;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:#F9FAFB;color:var(--muted);font-weight:500}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}

/* ── IMPORT ── */
.imp-list{border:1px solid var(--border);border-radius:10px;max-height:260px;overflow-y:auto}
.imp-row{display:flex;gap:10px;padding:7px 12px;border-bottom:1px solid #F3F4F6}
.imp-row:last-child{border-bottom:none}
.imp-row:nth-child(even){background:#FAFAFA}
.imp-num{font-size:11px;color:var(--soft);width:34px}

/* ── SETTING BOX ── */
.set-box{background:#F9FAFB;border-radius:11px;padding:14px;margin-bottom:11px;border:1px solid var(--border)}

.ctx-item:hover{background:#F1F5F9}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:#FEE2E2}

function getAllStudents(){
  const all=[];
  APP.classes.forEach(c=>{
    getStds(c.id).forEach(s=>{
      const clsN=parseInt(c.id.replace('c',''));
      const numStr=String(s.number).padStart(2,'0');
      const gakbun='2'+String(clsN).padStart(2,'0')+numStr;
      all.push({cid:c.id,cls:clsN,sid:s.id,name:s.name,number:s.number,gakbun});
    });
  });
  return all;
}
function searchStudents(q){
  if(!q)return[];
  const lq=q.toLowerCase();
  return getAllStudents().filter(s=>{
    if(s.name.includes(q))return true;
    if(s.gakbun.includes(q))return true;
    const short=s.gakbun.slice(1); // 7자리→6자리
    if(short.includes(q))return true;
    return false;
  }).slice(0,10);
}

// ────────────────────── STORAGE ──────────────────────
async function loadData(){
  if(!_uid)return;
  try{
    const doc=await db.collection('users').doc(_uid).get();
    if(doc.exists){
      const d=doc.data();
      APP.students=d.students||{};APP.records=d.records||{};
      APP.hrid=d.hrid||'c7';APP.apiKey=d.apiKey||'';
      APP.todos=d.todos||{};APP.contacts=d.contacts||{};
      APP.visibleCls=d.visibleCls||null;APP.menstrual=d.menstrual||{};
    }
  }catch(e){console.warn('loadData error',e);}
  // seed students if empty
  ALL_CLS.forEach(c=>{
    if(!APP.students[c.id]||APP.students[c.id].length===0){
      const k=c.name;
      if(SEED[k])APP.students[c.id]=SEED[k].map(s=>({...s,id:uid()}));
    }
  });
  await saveData();
}
async function saveData(){
  if(!_uid)return;
  try{
    await db.collection('users').doc(_uid).set({
      students:APP.students,records:APP.records,hrid:APP.hrid,apiKey:APP.apiKey,
      todos:APP.todos,contacts:APP.contacts,
      visibleCls:APP.visibleCls||null,menstrual:APP.menstrual||{}
    },{merge:true});
  }catch(e){console.warn('saveData error',e);}
}
function exportJSON(){
  const b=new Blob([JSON.stringify({students:APP.students,records:APP.records,contacts:APP.contacts,menstrual:APP.menstrual||{},visibleCls:APP.visibleCls,hrid:APP.hrid},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='기록백업_'+today()+'.json';a.click();
}

// ────────────────────── MUTATIONS ──────────────────────
function addStudents(cid,list){
  const cur=APP.students[cid]||[];
  const merged=[...cur,...list.filter(n=>!cur.some(c=>c.number===n.number))].sort((a,b)=>+a.number-+b.number);
  APP.students[cid]=merged;saveData();
}
function addRecords(cid,sids,rec){
  sids.forEach(sid=>{
    const k=cid+'__'+sid;
    const existing=APP.records[k]||[];
    APP.records[k]=[{...rec,id:uid(),cAt:Date.now()},...existing].sort((a,b)=>b.date.localeCompare(a.date)||b.cAt-a.cAt);
  });
  saveData();
}
function delRecord(cid,sid,rid){
  const k=cid+'__'+sid;
  const rec=(APP.records[k]||[]).find(r=>r.id===rid);
  // 이 기록에 달린 멘션 태그 → 상대방 자동 연결 기록 삭제
  if(rec&&rec.content){
    const tagRe=/@\[([^|]+)\|([^|]+)\|([^|]+)\|([^\]]+)\]/g;
    let m;
    while((m=tagRe.exec(rec.content))!==null){
      const toCid=m[2],toSid=m[3];
      const tk=toCid+'__'+toSid;
      APP.records[tk]=(APP.records[tk]||[]).filter(r=>!(r._auto&&r._linkCid===cid&&r._linkSid===sid&&(!r._linkRid||r._linkRid===rid)));
    }
  }
  // 이 기록 자체가 자동 연결 기록이면 그냥 삭제
  APP.records[k]=(APP.records[k]||[]).filter(r=>r.id!==rid);
  saveData();
}
function toggleFlag(cid,sid,e){
  if(e){e.stopPropagation();}
  APP.students[cid]=(APP.students[cid]||[]).map(s=>s.id===sid?{...s,flag:!s.flag}:s);
  saveData();render();
}
function setRole(cid,sid,role){
  APP.students[cid]=(APP.students[cid]||[]).map(s=>s.id===sid?{...s,role:role.trim()}:s);
  saveData();
}
function renameStudent(cid,sid,newName){
  if(!newName.trim())return;
  APP.students[cid]=(APP.students[cid]||[]).map(s=>s.id===sid?{...s,name:newName.trim()}:s);
  saveData();
}
function deleteStudent(cid,sid){
  APP.students[cid]=(APP.students[cid]||[]).filter(s=>s.id!==sid);
  delete APP.records[cid+'__'+sid];
  saveData();
}
function setDept(cid,sid,dept){
  APP.students[cid]=(APP.students[cid]||[]).map(s=>s.id===sid?{...s,dept}:s);saveData();
}

// 엑셀 시트 스타일 적용 헬퍼
function applyXlsxStyle(ws, cols){
  // 열 너비 설정
  ws['!cols']=cols.map(w=>({wch:w}));
  // 헤더 스타일 (A1~마지막 헤더)
  const range=XLSX.utils.decode_range(ws['!ref']||'A1');
  for(let c=range.s.c;c<=range.e.c;c++){
    const addr=XLSX.utils.encode_cell({r:0,c});
    if(!ws[addr])continue;
    ws[addr].s={font:{bold:true},fill:{fgColor:{rgb:'1A2535'},patternType:'solid'},
      font:{bold:true,color:{rgb:'FFFFFF'}},alignment:{horizontal:'center',vertical:'center',wrapText:true}};
  }
  // 내용 셀 줄바꿈
  for(let r=range.s.r+1;r<=range.e.r;r++){
    const contAddr=XLSX.utils.encode_cell({r,c:range.e.c-1}); // 내용 열
    if(ws[contAddr])ws[contAddr].s={alignment:{wrapText:true,vertical:'top'}};
  }
  // 행 높이 (내용 행)
  ws['!rows']=[{hpt:22}]; // 헤더
  for(let r=1;r<=range.e.r;r++){
    if(!ws['!rows'])ws['!rows']=[];
    ws['!rows'][r]={hpt:60};
  }
}

// ────────────────────── SEARCH VIEW ──────────────────────
function doSearch(q){
  UI.srchQ=q;
  if(!q.trim()){UI.srchResults=[];renderSearchResults();return;}
  const kw=q.trim().toLowerCase();
  const results=[];
  APP.classes.forEach(cls=>{
    getStds(cls.id).forEach(s=>{
      getRecs(cls.id,s.id).forEach(r=>{
        if(r.content.toLowerCase().includes(kw)){results.push({cls,s,r});}
      });
    });
  });
  results.sort((a,b)=>b.r.date.localeCompare(a.r.date));
  UI.srchResults=results;
  renderSearchResults();
}
function renderSearchResults(){
  const q=UI.srchQ;const results=UI.srchResults;
  const cnt=document.getElementById('srch-cnt');
  const wrap=document.getElementById('srch-results');
  if(!cnt||!wrap)return;
  cnt.textContent=results.length?results.length+'건 발견':q?'결과 없음':'';
  if(!q){
    wrap.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">검색어를 입력하세요</div><div style="font-size:12px;color:var(--soft)">전체 반, 전체 학생의 기록 내용을 검색합니다</div></div>`;
  } else if(!results.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-icon">😶</div><div class="empty-title">"${esc(q)}"에 해당하는 기록이 없습니다</div></div>`;
  } else {
    wrap.innerHTML=results.map(({cls,s,r})=>
      `<div class="srch-hit" onclick="selCls('${cls.id}');setTimeout(()=>selStu('${s.id}'),50)">
        <div class="srch-hit-top">${badge(r.type)}<span class="srch-hit-who">${esc(s.name)}</span><span class="srch-hit-cls">${cls.name} ${s.number}번</span><span style="font-size:11px;color:var(--soft);margin-left:auto">${fmtD(r.date)}</span></div>
        <div class="srch-hit-body">${highlightKw(r.content,q)}</div>
      </div>`).join('');
  }
}
function highlightKw(text,kw){
  if(!kw)return esc(text);
  const escaped=kw.replace(/[-.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp('('+escaped+')','gi');
  return esc(text).replace(re,'<span class="srch-kw">$1</span>');
}
function renderSearch(){
  const q=UI.srchQ;
  const results=UI.srchResults;
  const h=`<div class="hd"><div class="hd-left"><h1>🔍 기록 검색</h1>

  <div class="fb">

// ────────────────────── STATS VIEW ──────────────────────
function renderStats(){
  const TYPES_ALL=['자율','진로','행동특성','상담메모','교과'];
  const clsData=APP.classes.map(c=>{
    const stds=getStds(c.id);
    const allRecs=[];stds.forEach(s=>allRecs.push(...getRecs(c.id,s.id)));
    const noRec=stds.filter(s=>getRecs(c.id,s.id).length===0);
    const flags=stds.filter(s=>s.flag);
    const typeCnt={};TYPES_ALL.forEach(t=>typeCnt[t]=0);
    allRecs.forEach(r=>{if(typeCnt[r.type]!==undefined)typeCnt[r.type]++;});
    return{cls:c,stds,allRecs,noRec,flags,typeCnt};
  });
  const totalRecs=clsData.reduce((s,d)=>s+d.allRecs.length,0);
  const totalFlags=clsData.reduce((s,d)=>s+d.flags.length,0);
  const totalNoRec=clsData.reduce((s,d)=>s+d.noRec.length,0);
  const totalStds=clsData.reduce((s,d)=>s+d.stds.length,0);

  let h=`<div class="hd"><div class="hd-left"><h1>📊 학급 통계</h1><div class="hd-meta">전체 ${APP.classes.length}개 반 · ${totalStds}명</div></div>
    <div class="hd-actions">
      <button class="btn btn-sec btn-sm" onclick="exportAllXlsx()">↓ 전체 엑셀</button>
    </div></div>
  <div class="stat-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${totalRecs}</div><div class="stat-lbl">전체 기록 수</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--red)">${totalFlags}</div><div class="stat-lbl">🔖 팔로우업</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${totalNoRec}</div><div class="stat-lbl">기록 없는 학생</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green)">${totalStds-totalNoRec}</div><div class="stat-lbl">기록 있는 학생</div></div>
    </div>`;

  // 반별 현황
  h+=`<div class="stat-sec">반별 기록 현황</div>`;
  const maxRec=Math.max(...clsData.map(d=>d.allRecs.length),1);
  clsData.forEach(d=>{
    const pct=Math.round(d.allRecs.length/maxRec*100);
    h+=`<div class="stat-bar-row" style="cursor:pointer" onclick="selCls('${d.cls.id}')">
      <span class="stat-bar-lbl">${d.cls.name}${d.cls.id===APP.hrid?'★':''}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:var(--blue-m)"></div></div>
      <span class="stat-bar-cnt">${d.allRecs.length}</span>
    </div>`;
  });

  // 유형별 합계
  h+=`<div class="stat-sec">유형별 기록 현황</div>`;
  const typeTotal={};TYPES_ALL.forEach(t=>typeTotal[t]=clsData.reduce((s,d)=>s+d.typeCnt[t],0));
  const maxType=Math.max(...Object.values(typeTotal),1);
  const typeColors={자율:'var(--blue-m)',진로:'var(--purple)',행동특성:'var(--green)',상담메모:'var(--amber)',교과:'var(--slate)'};
  TYPES_ALL.forEach(t=>{
    const pct=Math.round(typeTotal[t]/maxType*100);
    h+=`<div class="stat-bar-row">
      <span class="stat-bar-lbl">${t}</span>
      <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct}%;background:${typeColors[t]}"></div></div>
      <span class="stat-bar-cnt">${typeTotal[t]}</span>
    </div>`;
  });

  // 팔로우업 목록
  const allFlags=[];clsData.forEach(d=>d.flags.forEach(s=>allFlags.push({cls:d.cls,s})));
  if(allFlags.length>0){
    h+=`<div class="stat-sec">🔖 팔로우업 학생 (${allFlags.length}명)</div><div class="stat-nolist">`;
    allFlags.forEach(({cls,s})=>{
      h+=`<div class="stat-noitem" style="cursor:pointer" onclick="selCls('${cls.id}');setTimeout(()=>selStu('${s.id}'),50)">
        <span class="stat-nonum">${s.number}번</span>
        <span style="font-weight:700">${esc(s.name)}</span>
        <span style="font-size:11px;color:var(--soft);margin-left:4px">${cls.name}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  // 기록 없는 학생 (담임반만)
  const hrCls=clsData.find(d=>d.cls.id===APP.hrid);
  if(hrCls&&hrCls.noRec.length>0){
    h+=`<div class="stat-sec">📋 기록 없는 학생 — ${hrCls.cls.name} (${hrCls.noRec.length}명)</div><div class="stat-nolist">`;
    hrCls.noRec.forEach(s=>{
      h+=`<div class="stat-noitem" style="cursor:pointer" onclick="selCls('${hrCls.cls.id}');setTimeout(()=>selStu('${s.id}'),50)">
        <span class="stat-nonum">${s.number}번</span>
        <span style="font-weight:700">${esc(s.name)}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;
  document.getElementById('main').innerHTML=h;
}

// ────────────────────── CONTACTS UPLOAD ──────────────────────
function ctUpload(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.xlsx,.xls';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const ab=await file.arrayBuffer();
      const wb=XLSX.read(ab,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const hdrs=(rows[0]||[]).map(h=>String(h||'').trim());
      const ni=hdrs.findIndex(h=>h.includes('번호')||h==='번');
      const nmi=hdrs.findIndex(h=>h.includes('이름')||h.includes('성명'));
      const sti=hdrs.findIndex(h=>h.includes('학생')||h.includes('본인')||h.toUpperCase().includes('HP')&&!h.includes('父')&&!h.includes('母'));
      const ddi=hdrs.findIndex(h=>h.includes('부')||h.includes('父')||h.includes('아버'));
      const mmi=hdrs.findIndex(h=>h.includes('모')||h.includes('母')||h.includes('어머'));
      const cleanPhone=v=>{const s=String(v||'').trim();return(s==='-'||s==='　'||s===''||s==='없음')?'':s;};
      const stds=getStds(UI.cid);
      if(!APP.contacts[UI.cid])APP.contacts[UI.cid]={};
      let cnt=0;
      rows.slice(1).forEach(row=>{
        const num=String(row[ni]||'').trim();
        const name=String(row[nmi]||'').trim();
        const s=stds.find(s=>String(s.number)===num||(name&&s.name===name));
        if(!s)return;
        APP.contacts[UI.cid][s.id]={
          stu:sti>=0?cleanPhone(row[sti]):'',
          dad:ddi>=0?cleanPhone(row[ddi]):'',
          mom:mmi>=0?cleanPhone(row[mmi]):''
        };
        cnt++;
      });
      saveData();
      alert(cnt+'명 연락처가 업로드됐습니다.');
      render();
    }catch(err){alert('파일 오류: '+err.message);}
  };
  inp.click();
}

function calRecDates(cid){
  const dates=new Set();
  const stds=getStds(cid);
  stds.forEach(s=>{getRecs(cid,s.id).forEach(r=>dates.add(r.date));});
  return dates;
}
function calStuDates(cid,sid){
  const dates=new Set();
  getRecs(cid,sid).forEach(r=>dates.add(r.date));
  return dates;
}
function buildCal(yearMonth,recDates,alignRight){
  const [y,m]=yearMonth.split('-').map(Number);
  const todayStr=today();
  const firstDay=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dows=['일','월','화','수','목','금','토'];
  let cells='';
  dows.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDay;i++)cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasRec=recDates.has(ds);
    const isSel=UI.fd===ds;
    const isToday=todayStr===ds;
    let cls='cal-day';
    if(hasRec)cls+=' has-rec';else cls+=' no-rec';
    if(isSel)cls+=' sel';
    if(isToday)cls+=' today';
    cells+=`<div class="${cls}" onclick="setFD('${ds}')">${d}</div>`;
  }
  return `<div class="cal-pop${alignRight?' right':''}">
    <div class="cal-head">
      <button class="cal-nav" onclick="calNav(-1,event)">‹</button>
      <span class="cal-month">${y}년 ${mn[m-1]}</span>
      <button class="cal-nav" onclick="calNav(1,event)">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    ${UI.fd?`<div class="cal-foot"><button class="btn btn-ghost btn-sm" style="font-size:11px" onclick="setFD('');event.stopPropagation()">초기화</button></div>`:''}
  </div>`;
}
function calNav(dir,e){
  e.stopPropagation();
  const [y,m]=UI.calYM.split('-').map(Number);
  let nm=m+dir,ny=y;
  if(nm>12){nm=1;ny++;}else if(nm<1){nm=12;ny--;}
  UI.calYM=`${ny}-${String(nm).padStart(2,'0')}`;
  renderMain();
}

  e.stopPropagation();
  UI.fdOpen=!UI.fdOpen;

// ────────────────────── MENTION ──────────────────────
let _mentionQ=null, _mentionStart=-1, _mentionSel=0;
function mentionCheck(ta){
  const val=ta.value, pos=ta.selectionStart;
  // @ 뒤 커서 위치에서 검색어 추출
  const before=val.slice(0,pos);
  const atIdx=before.lastIndexOf('@');
  const drop=document.getElementById('mention-drop');
  if(!drop)return;
  if(atIdx<0||(before.slice(atIdx+1).includes(' ')&&before.slice(atIdx+1).length>1)){
    drop.style.display='none';_mentionQ=null;return;
  }
  const q=before.slice(atIdx+1);
  if(!q){drop.style.display='none';_mentionQ=null;return;}
  const results=searchStudents(q);
  if(!results.length){drop.style.display='none';_mentionQ=null;return;}
  _mentionQ=q;_mentionStart=atIdx;_mentionSel=0;
  drop.innerHTML=results.map((s,i)=>
    `<div class="mention-item${i===0?' active':''}" data-idx="${i}" data-gakbun="${s.gakbun}" data-name="${esc(s.name)}" data-cid="${s.cid}" data-sid="${s.sid}" data-cls="${s.cls}" onmousedown="mentionSelect(${i})">`+
    `<span class="mention-cls">${s.cls}반</span><span class="mention-name">${esc(s.name)}</span><span class="mention-id">(${s.gakbun})</span></div>`
  ).join('');
  drop.style.display='block';
}
function mentionKey(e){
  const drop=document.getElementById('mention-drop');
  if(!drop||drop.style.display==='none')return;
  const items=drop.querySelectorAll('.mention-item');
  if(e.key==='ArrowDown'){e.preventDefault();_mentionSel=Math.min(_mentionSel+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();_mentionSel=Math.max(_mentionSel-1,0);}
  else if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();mentionSelect(_mentionSel);return;}
  else if(e.key==='Escape'){drop.style.display='none';_mentionQ=null;return;}
  items.forEach((it,i)=>it.classList.toggle('active',i===_mentionSel));
  // 선택된 항목이 보이도록 스크롤
  const active=items[_mentionSel];
  if(active)active.scrollIntoView({block:'nearest'});
}
function mentionSelect(idx){
  const drop=document.getElementById('mention-drop');
  if(!drop)return;
  const items=drop.querySelectorAll('.mention-item');
  const item=items[idx];if(!item)return;
  const ta=document.getElementById('ar-cont');if(!ta)return;
  const cls=item.dataset.cls, name=item.dataset.name, gakbun=item.dataset.gakbun;
  const cid=item.dataset.cid, sid=item.dataset.sid;
  const tagText=`@[${cls}반 ${name}|${cid}|${sid}|${gakbun}]`;
  const val=ta.value;
  const before=val.slice(0,_mentionStart);
  const after=val.slice(ta.selectionStart);
  ta.value=before+tagText+' '+after;
  ta.selectionStart=ta.selectionEnd=before.length+tagText.length+1;
  AR.content=ta.value;
  drop.style.display='none';_mentionQ=null;
  const btn=document.querySelector('.modal .btn-pri:last-child');
  if(btn)btn.disabled=!(AR.sids.length>0&&AR.content.trim()&&AR.date);
}
function renderMentions(text){
  // @[반 이름|cid|sid|gakbun] → 클릭 가능한 태그로 변환
  return esc(text).replace(/@\[([^|]+)\|([^|]+)\|([^|]+)\|([^\]]+)\]/g,
    (_,label,cid,sid,gakbun)=>
      `<span class="stu-tag" onclick="navToStu('${cid}','${sid}')" title="${gakbun}">@${label}</span>`
  );
}
function navToStu(cid,sid){

function createLinkRecord(fromCid,fromSid,fromName,fromCls,toCid,toSid,date,fromRid){
  // B학생에게 자동 연결 기록 생성
  const k=toCid+'__'+toSid;
  const existing=APP.records[k]||[];
  const auto={id:uid(),cAt:Date.now(),date,type:'연결됨',
    content:`${fromCls}반 ${fromName} 학생의 상담메모에서 연결됨`,
    _linkCid:fromCid,_linkSid:fromSid,_linkRid:fromRid,_auto:true};

function submitRec(){

  addRecords(UI.cid,[...AR.sids],{date:AR.date,type:AR.type,content:cont});
  // 멘션 태그 파싱 → 연결 기록 자동 생성 (상담메모일 때만)
  if(AR.type==='상담메모'){
    const tagRe=/@\[([^|]+)\|([^|]+)\|([^|]+)\|([^\]]+)\]/g;
    let m;
    while((m=tagRe.exec(cont))!==null){
      const [,label,toCid,toSid]=m;
      AR.sids.forEach(fromSid=>{
        const fromStu=getStds(UI.cid).find(s=>s.id===fromSid);
        if(!fromStu)return;

        const fromRecs=getRecs(UI.cid,fromSid);

        createLinkRecord(UI.cid,fromSid,fromStu.name,fromCls,toCid,toSid,AR.date,fromRid);
      });

async function fuFile(file){
  FU.fname=file.name;FU.step='proc';FU.err='';
  showFile();
  const cls=getCls();const stds=getStds(UI.cid);
  const types=clsTypes(cls);
  const sListTxt=stds.map(s=>`${s.number}번 ${s.name}`).join(', ');
  const prompt=`이 문서에서 학생별 활동 정보를 추출해주세요.\n학생 목록: ${sListTxt}\n활동 유형(반드시 이 중에서): ${types.join(', ')}\n\nJSON 배열만 응답(다른 텍스트 없이):\n[{"who":"이름 또는 번호","type":"활동유형","content":"활동내용","date":"YYYY-MM-DD"}]`;
  try{
    let msgContent;
    if(file.name.toLowerCase().endsWith('.pdf')){
      const b64=await new Promise((ok,fail)=>{const r=new FileReader();r.onload=()=>ok(r.result.split(',')[1]);r.onerror=fail;r.readAsDataURL(file);});
      msgContent=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}];
    } else {
      const ab=await file.arrayBuffer();
      const wb2=XLSX.read(ab,{type:'array'});
      const ws2=wb2.Sheets[wb2.SheetNames[0]];
      const txt=XLSX.utils.sheet_to_csv(ws2);
      msgContent=`파일 내용:\n${txt}\n\n${prompt}`;
    }
    const d={content:[{text:await callAI(msgContent,2000)}]};
    const raw=(d.content[0].text||'').replace(/```json\n?|```/g,'').trim();
    const parsed=JSON.parse(raw);
    const useDate=FU.date||today();
    FU.items=parsed.map(item=>{
      const s=stds.find(s=>s.name===item.who||String(s.number)===String(item.who)||item.who?.includes(s.name));
      return s?{...item,sid:s.id,name:s.name,date:useDate,src:file.name}:null;
    }).filter(Boolean);
    if(!FU.date)FU.date=today();
    FU.step='review';
  }catch(e){FU.err='처리 오류: '+e.message;FU.step='upload';}
  showFile();
}

async function impFile(file){
  IMP.err='';

    const ab=await file.arrayBuffer();
    const wb2=XLSX.read(ab,{type:'array'});
    const ws2=wb2.Sheets[wb2.SheetNames[0]];

function drToggleTab(t){
  if(DR.tabs.includes(t))DR.tabs=DR.tabs.filter(x=>x!==t);
  else DR.tabs.push(t);
  if(!DR.tabs.length)DR.tabs=[t]; // 최소 1개
  DR.text='';DR.selectedRecs=[];showDraft();
}
function drToggleRec(id){
  if(DR.selectedRecs.includes(id))DR.selectedRecs=DR.selectedRecs.filter(x=>x!==id);
  else DR.selectedRecs.push(id);
  // 체크박스 UI만 업데이트 (전체 재렌더 없이)
  showDraft();
}
function drSelectAll(){
  const typeMap={세특:'교과',자율활동:'자율',진로활동:'진로',행동특성:'행동특성'};
  const selTypes=DR.tabs.map(t=>typeMap[t]||t);

function drClearAll(){DR.selectedRecs=[];showDraft();}
function drCopy(){const t=document.getElementById('dr-box');if(t)navigator.clipboard.writeText(t.innerText);}
async function drGen(){
  const stu=getStu();
  const typeMap={세특:'교과',자율활동:'자율',진로활동:'진로',행동특성:'행동특성'};
  const selTypes=DR.tabs.map(t=>typeMap[t]||t);
  const allRecs=getRecs(UI.cid,UI.sid).filter(r=>selTypes.includes(r.type));
  const recs=DR.selectedRecs.length
    ?allRecs.filter(r=>DR.selectedRecs.includes(r.id))
    :allRecs;
  if(!recs.length){DR.text='선택된 기록이 없습니다.';DR.loading=false;showDraft();return;}
  const tabLabel=DR.tabs.join('·');
  const txt=recs.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`[${r.date}][${r.type}] ${r.content}`).join('\n');
  DR.loading=true;DR.text='';showDraft();
  try{
    DR.text=(await callAI(`${stu.name} 학생의 활동 기록:\n\n${txt}\n\n위를 바탕으로 학교생활기록부 ${tabLabel} 항목에 적합한 문체로 350~500자의 초안을 작성해주세요. 숫자·날짜는 그대로 활용하고, 입력자 관점이 아닌 학생 행동·성취 중심으로 서술하세요. 초안만 출력하세요.`,1000)).trim();
  }catch(e){DR.text='오류: '+e.message;}
  DR.loading=false;showDraft();
}

async function anaMode(mode){
  const stu=getStu();
  if(mode==='records'){
    const recs=getRecs(UI.cid,UI.sid);
    if(!recs.length){alert('기록이 없습니다.');return;}
    const txt=recs.map(r=>`[${r.type}][${r.date}] ${r.content}`).join('\n');
    const deptPart=stu.dept?`희망 계열: ${stu.dept}\n`:'';
    // 수강과목 추출
    const clsNumA=UI.cid.replace('c','');
    const stuNumA=stu.number;
    const subjectsByTerm=[];
    ['1학기','2학기'].forEach(term=>{
      const ttD=(TIMETABLE[term]||{})[clsNumA]||{};
      const stuTtA=ttD[stuNumA];
      if(stuTtA?.s){
        const subSet=new Set();
        Object.values(stuTtA.s).forEach(days=>Object.values(days).forEach(cell=>{if(cell.s)subSet.add(cell.s);}));
        if(subSet.size)subjectsByTerm.push(`2학년 ${term} 수강 과목: ${[...subSet].join(', ')}`);
      }
    });
    const subjectsPart=subjectsByTerm.length?subjectsByTerm.join('\n')+'\n':'';

let _ctxMenu=null;
function openStuMenu(cid,sid,e){
  e.stopPropagation();
  closeCtxMenu();
  const s=getStds(cid).find(s=>s.id===sid);
  if(!s)return;
  const menu=document.createElement('div');
  menu.className='ctx-menu';
  menu.id='ctx-menu';
  menu.innerHTML=`
    <button class="ctx-item" onclick="startRename('${cid}','${sid}')">✏ 이름 변경</button>
    <button class="ctx-item danger" onclick="confirmDelete('${cid}','${sid}')">🗑 학생 삭제</button>`;
  document.body.appendChild(menu);
  const rect=e.target.getBoundingClientRect();
  let top=rect.bottom+4, left=rect.left;
  if(left+menu.offsetWidth>window.innerWidth)left=window.innerWidth-menu.offsetWidth-8;
  if(top+120>window.innerHeight)top=rect.top-124;
  menu.style.top=top+'px';menu.style.left=left+'px';
  _ctxMenu=menu;
  setTimeout(()=>document.addEventListener('click',closeCtxMenu,{once:true}),0);
}
function closeCtxMenu(){
  if(_ctxMenu){_ctxMenu.remove();_ctxMenu=null;}
}
function startRename(cid,sid){
  closeCtxMenu();
  const s=getStds(cid).find(s=>s.id===sid);
  if(!s)return;
  const newName=prompt('새 이름을 입력하세요',s.name);
  if(newName&&newName.trim()&&newName.trim()!==s.name){
    renameStudent(cid,sid,newName);
    render();
  }
}
function confirmDelete(cid,sid){
  closeCtxMenu();
  const s=getStds(cid).find(s=>s.id===sid);
  if(!s)return;
  const recCnt=getRecs(cid,sid).length;
  const msg=recCnt
    ?s.name+' 학생을 삭제하시겠습니까?\n기록 '+recCnt+'건도 함께 삭제됩니다.'
    :s.name+' 학생을 삭제하시겠습니까?';
  if(confirm(msg)){
    deleteStudent(cid,sid);
    if(UI.sid===sid){UI.view='class';UI.sid=null;}
    render();
  }
}

// ── 생리결석 관리 ────────────────────────────────────────────
function openMenstrual(sid){
  const cid=UI.cid;
  const stu=getStds(cid).find(s=>s.id===sid);
  if(!stu)return;
  const data=APP.menstrual[cid+'__'+sid]||{};
  // 월 목록: 3월~현재월 + 1
  const months=[];
  const now=new Date();
  for(let m=3;m<=now.getMonth()+2;m++){
    const key=`2026-${String(m).padStart(2,'0')}`;
    months.push(key);
  }
  const rows=months.map(ym=>{
    const entry=data[ym];
    const label=ym.slice(5)+'월';
    const used=!!entry;
    const dateStr=entry&&entry.date?entry.date:'';
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="width:36px;font-size:13px;font-weight:700;color:${used?'#7C3AED':'var(--soft)'}">${label}</span>
      <span style="flex:1;font-size:13px;color:${used?'var(--text)':'var(--soft)'}">${used?(dateStr?dateStr+'일':'날짜 미입력'):'미사용'}</span>
      <button class="btn btn-sm" style="background:${used?'#EDE9FE':'#F3F4F6'};color:${used?'#7C3AED':'var(--muted)'};border:1px solid ${used?'#C4B5FD':'#E5E7EB'}" onclick="editMenstrual('${cid}','${sid}','${ym}')">
        ${used?'✓ 수정':'+ 입력'}
      </button>
      ${used?`<button class="btn btn-sm" style="color:var(--red);background:none;border:none" onclick="delMenstrual('${cid}','${sid}','${ym}')">×</button>`:''}
    </div>`;
  }).join('');
  const body=`
    <div style="padding:4px 0 12px;color:var(--muted);font-size:12px">🟣 생리결석 사용 현황 — ${esc(stu.name)}</div>
    ${rows}
    <div class="modal-foot"><button class="btn btn-sec" onclick="closeMd()">닫기</button></div>`;
  wrapMd(esc(stu.name)+' — 생리결석', body);
}
function editMenstrual(cid,sid,ym){
  const data=APP.menstrual[cid+'__'+sid]||{};
  const existing=data[ym]?.date||'';
  const month=ym.slice(5)+'월';
  const body=`
    <div style="margin-bottom:14px;font-size:13px;color:var(--muted)">${month} 생리결석 날짜를 입력하세요 (선택)</div>
    <div class="field"><div class="lbl">날짜 (일)</div>
      <input class="inp" id="mens-date" type="number" min="1" max="31" placeholder="예: 15" value="${existing}" style="width:120px">
    </div>
    <div class="modal-foot">
      <button class="btn btn-sec" onclick="openMenstrual('${sid}')">← 뒤로</button>
      <button class="btn btn-pri" onclick="saveMenstrual('${cid}','${sid}','${ym}')">저장</button>
    </div>`;
  wrapMd('생리결석 입력', body);
}
function saveMenstrual(cid,sid,ym){
  const dateVal=document.getElementById('mens-date')?.value?.trim()||'';
  if(!APP.menstrual[cid+'__'+sid])APP.menstrual[cid+'__'+sid]={};
  APP.menstrual[cid+'__'+sid][ym]={date:dateVal,at:Date.now()};
  saveData();openMenstrual(sid);
}
function delMenstrual(cid,sid,ym){
  if(!APP.menstrual[cid+'__'+sid])return;
  delete APP.menstrual[cid+'__'+sid][ym];
  saveData();openMenstrual(sid);
}

// ── AI 호출 헬퍼 (Claude 우선, 없으면 Gemini) ────────────────────
async function callAI(prompt, maxTokens=1000){
  if(!APP.apiKey)throw new Error('API 키가 없습니다. ⚙ 설정에서 Claude API 키를 입력해주세요.');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':APP.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
  });
  const d=await res.json();
  if(d.content?.[0]?.text)return d.content[0].text;
  throw new Error(d.error?.message||'Claude API 오류');
}

auth.onAuthStateChanged(async(user)=>{
  const loginScreen=document.getElementById('login-screen');
  const appEl=document.getElementById('app');
  if(user){
    _uid=user.uid;
    _currentUser=user;
    loginScreen.style.display='none';
    appEl.style.display='flex';
    await loadData();
    UI.cid=APP.hrid||'c7';
    render();
    checkFirstVisit();
  } else {
    _uid=null;
    _currentUser=null;
    APP={classes:ALL_CLS,students:{},records:{},hrid:'c7',apiKey:'',todos:{},contacts:{},visibleCls:null};
    loginScreen.style.display='flex';
    appEl.style.display='none';
  }
});
</script>
</body>
</html>
